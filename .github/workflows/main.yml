name: Linki Guncelle

on:
  schedule:
    - cron: '0 */4 * * *' # Her 4 saatte bir otomatik çalışır
  workflow_dispatch: # İstediğinde elle çalıştırmak için

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Yazma iznini buradan da garantiye alıyoruz
    steps:
      - uses: actions/checkout@v3 # Daha güncel versiyon

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gereçleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp # Her zaman en güncel yt-dlp'yi kurar

      - name: Linki Yenile
        run: python youtube_al.py

      - name: Değişiklikleri Kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add yayinlar.m3u
          git commit -m "Link güncellendi" || exit 0
          git push
