name: Flux View Automation

on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir tetikler
  workflow_dispatch: # Manuel baslatma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Bot
        # -u parametresi loglarin anlik akmasini saglar (sen girince degil, her zaman akar)
        run: python -u bot.py 
