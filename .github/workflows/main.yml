name: Linki Guncelle

on:
  schedule:
    - cron: '0 */4 * * *' # Her 4 saatte bir otomatik çalışır
  workflow_dispatch: # İstediğinde elle çalıştırmak için

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub'ın dosyayı kaydetmesine izin verir
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node 24 zorunluluğu için

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v2'den v4'e güncellendi

      - name: Python Kur
        uses: actions/setup-python@v5 # v2'den v5'e güncellendi
        with:
          python-version: '3.11'

      - name: Gereçleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install requests yt-dlp # Requests kütüphanesini buraya ekledik

      - name: Linki Yenile
        run: python youtube_al.py

      - name: Değişiklikleri Kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add yayinlar.m3u
          git commit -m "Link güncellendi" || exit 0
          git push
