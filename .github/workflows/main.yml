name: Flux View Bot Automation

on:
  schedule:
    - cron: '0 */2 * * *' # Her 2 saatte bir çalışır
  workflow_dispatch: # Manuel başlatma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          # GitHub Actions'ın takılmaması için sonsuz döngüyü script içinden değil, 
          # workflow üzerinden yönetmek daha sağlıklıdır.
          PYTHONUNBUFFERED: 1
        run: python your_script_name.py 
        # 'your_script_name.py' kısmını kendi dosya adınla değiştir.
