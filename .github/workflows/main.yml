name: Linki Guncelle

on:
  schedule:
    - cron: '0 */4 * * *' # Her 4 saatte bir otomatik çalışır
  workflow_dispatch: # İstediğinde elle çalıştırmak için

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dosyayı kaydetmek için şart
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # GitHub 2026 zorunluluğu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gereçleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install requests yt-dlp # Her iki yöntemi de desteklemesi için ikisini de kuruyoruz

      - name: Linki Yenile
        run: python youtube_al.py

      - name: Değişiklikleri Kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add yayinlar.m3u
          git commit -m "Link güncellendi (2026 Stabil Versiyon)" || exit 0
          git push
