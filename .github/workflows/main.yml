name: Linki Guncelle

on:
  schedule:
    - cron: '0 */4 * * *' # Her 4 saatte bir otomatik çalışır
  workflow_dispatch: # İstediğinde elle çalıştırmak için

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # GitHub'ın istediği zorunlu Node.js 24 değişkenini ekledik
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v3'ten v4'e yükselttik

      - name: Python Kur
        uses: actions/setup-python@v5 # v4'ten v5'e yükselttik
        with:
          python-version: '3.11' # Daha güncel bir Python sürümü

      - name: Gereçleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp

      - name: Linki Yenile
        run: python youtube_al.py

      - name: Değişiklikleri Kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add yayinlar.m3u
          git commit -m "Link güncellendi (Node 24 Guncellemesi)" || exit 0
          git push
